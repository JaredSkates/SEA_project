<!doctype html>
<html>
  <head>
    <title>Everyday Fitness | Favorites</title>
    <meta name="description" content="A Catalog Of Exercises" />
    <link rel="stylesheet" href="style.css" />
    <script src="js/data.js"></script>
    <script type="text/javascript" src="js/favorites-store.js"></script>
    <script type="text/javascript" src="js/catalog.js"></script>
    <script type="text/javascript" src="js/favorites-page.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Everyday Fitness | Favorites</h1>

      <div class="nav-bar">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="favorites.html">Favorites</a>
      </div>
    </header>

    <section class="filter-container">
      <select id="select-body-part" name="body" class="select-items">
        <option class="option-card">
          All Body Parts
        </option>
      </select>
      <select id="select-equipment" name="equipment" class="select-items">
        <option class="option-card">
          All Equipment
        </option>
      </select>
      <select id="select-level" name="all-levels" class="select-items">
        <option class="option-card">
          All Levels
        </option>
      </select>
      <input id="search-query" onchange="applyFilters()" placeholder="Search Exercise..." />
    </section>

    <hr/>

    <div id="card-container"></div>
    <div data-id="" class="card" style="display: none">
      <div class="card-content">
        <div class="card-header">
          <h2>Gym Exercise Title</h2>
          <button id="fav-btn" class="unfavorite-btn favorite-btn" onclick="favoriteAnExercise(event)">UnFavorite</button>
        </div>
        <ul class="main-list">
          <li id="description">description: </li>
          <li id="level">level: </li>
          <li id="bodypart">body part: </li>
          <li id="equipment">equipment: </li>
        </ul>
      </div>
    </div>

  </body>
</html>
